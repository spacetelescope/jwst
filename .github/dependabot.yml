version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    target-branch: "main"
    labels:
      - automation
      - dependencies
      - no-changelog-entry-needed
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    assignees:
      - "zacharyburnett"

  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    assignees:
      - "zacharyburnett"
